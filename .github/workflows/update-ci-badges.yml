
name: update-ci-badges

on:
  workflow_run:
    workflows:
      - Tests 3.12
      - Tests 3.13
      - Tests 3.14
      - Tests 3.15
      - Tests 3.13t
      - Tests 3.14t
      - Tests 3.15t
    types:
      - completed

permissions:
  contents: write
  actions: read

jobs:
  update-badge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate badge JSON
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import urllib.request
          from pathlib import Path

          owner = os.environ["OWNER"]
          repo = os.environ["REPO"]
          run_id = os.environ["RUN_ID"]
          workflow_name = os.environ["WORKFLOW_NAME"]
          token = os.environ["GH_TOKEN"]

          api = f"https://api.github.com/repos/{owner}/{repo}/actions/runs/{run_id}/jobs?per_page=100&filter=latest"
          req = urllib.request.Request(
              api,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "ci-badge-updater",
              },
          )

          with urllib.request.urlopen(req) as response:
              payload = json.load(response)

          jobs = payload.get("jobs", [])
          total = len(jobs)
          success = sum(1 for job in jobs if job.get("conclusion") == "success")

          if total == 0:
              color = "lightgrey"
          elif success == total:
              color = "brightgreen"
          elif success >= total - 1:
              color = "yellow"
          elif success >= 1:
              color = "orange"
          else:
              color = "red"

          slug = re.sub(r"[^a-z0-9]+", "_", workflow_name.lower()).strip("_")
          badge_path = Path("badge_output") / f"{slug}.json"
          badge_path.parent.mkdir(parents=True, exist_ok=True)

          badge = {
              "schemaVersion": 1,
              "label": workflow_name,
              "message": f"{success}/{total} OK",
              "color": color,
          }

          badge_path.write_text(
              json.dumps(badge, ensure_ascii=False, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )
          print(f"Wrote {badge_path}")
          PY

      - name: Publish badge on badges branch
        run: |
          BADGE_FILE="badge_output/*.json"
          if ! ls $BADGE_FILE >/dev/null 2>&1; then
            echo "No generated badge file"
            exit 0
          fi

          if git ls-remote --exit-code --heads origin badges >/dev/null 2>&1; then
            git worktree add badges-branch origin/badges
          else
            git worktree add --detach badges-branch
            cd badges-branch
            git checkout --orphan badges
            git rm -rf . >/dev/null 2>&1 || true
            cd ..
          fi

          mkdir -p badges-branch/badges
          cp $BADGE_FILE badges-branch/badges/

          cd badges-branch
          if git diff --quiet -- badges; then
            echo "No badge changes"
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add badges/*.json
          git commit -m "chore: 🔧 update CI badges"
          git push origin HEAD:badges

