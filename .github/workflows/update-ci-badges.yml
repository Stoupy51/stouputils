
name: update-ci-badges

on:
  workflow_run:
    workflows:
      - Tests 3.12
      - Tests 3.13
      - Tests 3.14
      - Tests 3.15
      - Tests 3.13t
      - Tests 3.14t
      - Tests 3.15t
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: update-ci-badges
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  update-badge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate badge JSONs
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import urllib.request
          from pathlib import Path

          owner = os.environ["OWNER"]
          repo = os.environ["REPO"]
          token = os.environ["GH_TOKEN"]

          TRACKED_WORKFLOWS = [
              "Tests 3.12",
              "Tests 3.13",
              "Tests 3.14",
              "Tests 3.15",
              "Tests 3.13t",
              "Tests 3.14t",
              "Tests 3.15t",
          ]

          def gh_get(url):
              req = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "ci-badge-updater",
                  },
              )
              with urllib.request.urlopen(req) as response:
                  return json.load(response)

          # Fetch the latest run for each tracked workflow
          for workflow_name in TRACKED_WORKFLOWS:
              slug = re.sub(r"[^a-z0-9]+", "_", workflow_name.lower()).strip("_")
              badge_path = Path("badge_output") / f"{slug}.json"
              badge_path.parent.mkdir(parents=True, exist_ok=True)

              # Get latest run for this workflow on the default branch
              runs_url = (
                  f"https://api.github.com/repos/{owner}/{repo}/actions/workflows"
                  f"/{slug}.yml/runs?per_page=1&status=completed"
              )
              try:
                  runs_payload = gh_get(runs_url)
              except Exception as e:
                  print(f"Warning: could not fetch runs for {workflow_name}: {e}")
                  continue

              runs = runs_payload.get("workflow_runs", [])
              if not runs:
                  print(f"No completed runs found for {workflow_name}, skipping")
                  continue

              run_id = runs[0]["id"]

              jobs_url = (
                  f"https://api.github.com/repos/{owner}/{repo}/actions/runs"
                  f"/{run_id}/jobs?per_page=100&filter=latest"
              )
              jobs_payload = gh_get(jobs_url)
              jobs = jobs_payload.get("jobs", [])
              total = len(jobs)
              success = sum(1 for job in jobs if job.get("conclusion") == "success")

              if total == 0:
                  color = "lightgrey"
              elif success == total:
                  color = "brightgreen"
              elif success >= total - 1 and total != 1:
                  color = "yellow"
              elif success >= 1 and total != 1:
                  color = "orange"
              else:
                  color = "red"

              badge = {
                  "schemaVersion": 1,
                  "label": workflow_name.split(maxsplit=1)[-1],
                  "message": f"{success}/{total} OK",
                  "color": color,
              }

              badge_path.write_text(
                  json.dumps(badge, ensure_ascii=False, separators=(",", ":")) + "\n",
                  encoding="utf-8",
              )
              print(f"Wrote {badge_path}")
          PY

      - name: Publish badges on badges branch
        run: |
          BADGE_FILE="badge_output/*.json"
          if ! ls $BADGE_FILE >/dev/null 2>&1; then
            echo "No generated badge file"
            exit 0
          fi

          if git ls-remote --exit-code --heads origin badges >/dev/null 2>&1; then
            git fetch origin badges
            git worktree add -B badges badges-branch origin/badges
          else
            git worktree add --detach badges-branch
            cd badges-branch
            git checkout --orphan badges
            git rm -rf . >/dev/null 2>&1 || true
            cd ..
          fi

          mkdir -p badges-branch/badges
          cp $BADGE_FILE badges-branch/badges/

          cd badges-branch
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add badges/*.json
          if git diff --cached --quiet; then
            echo "No badge changes"
            exit 0
          fi

          git commit -m "chore: 🔧 update CI badges"
          for attempt in 1 2 3 4 5; do
            if git push origin badges:badges; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi

            echo "Push failed on attempt $attempt, fetching/rebasing and retrying..."
            git fetch origin badges
            git rebase origin/badges
          done

          echo "Failed to push badges branch after 5 attempts"
          exit 1
