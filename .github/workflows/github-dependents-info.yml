
name: GitHub Dependents Info
on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0"  # Every Sunday at midnight
permissions: read-all
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: nvuillam/github-dependents-info@v3.0.0
        with:
          repo: Stoupy51/stouputils
          sort: stars
          llm-summary: false
      - name: Inject latest dependents badge into README
        run: |
          python3 - <<'EOF'
          from pathlib import Path

          docs = Path("docs/github-dependents-info.md")
          readme = Path("README.md")

          badges = [
              l.strip()
              for l in docs.read_text(encoding="utf-8").splitlines()
              if l.startswith("[![Generated by github-dependents-info]")
          ]

          if not badges:
              raise SystemExit("No badge found")

          latest = badges[-1]  # Stars

          lines = readme.read_text(encoding="utf-8").splitlines()

          replaced = False
          for i, line in enumerate(lines):
              if "Generated by github-dependents-info" in line:
                  lines[i] = latest
                  replaced = True
                  break

          if not replaced:
              raise SystemExit("No existing badge found in README")

          readme.write_text("\n".join(lines) + "\n", encoding="utf-8")
          EOF

          sudo rm -f docs/github-dependents-info.md
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(README): 🔧 Update dependents badges"
          file_pattern: README.md

