
name: GitHub Dependents Info
on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0"  # Every Sunday at midnight
permissions: read-all
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: nvuillam/github-dependents-info@v3.0.0
        with:
          repo: Stoupy51/stouputils
          badgemarkdownfile: ./README.md
          sort: stars
          llm-summary: false
      - name: Inject all 4 badges into README
        run: |
          python3 - <<'EOF'
          import re, os

          with open("docs/github-dependents-info.md") as f:
              badges = [l.strip() for l in f if l.startswith("[![Generated by github-dependents-info]")]

          badge_block = "\n".join(badges)

          with open("README.md") as f:
              content = f.read()

          new_content = re.sub(
              r"<!-- gh-dependents-info-used-by-start -->.*?<!-- gh-dependents-info-used-by-end -->",
              f"<!-- gh-dependents-info-used-by-start -->\n{badge_block}\n<!-- gh-dependents-info-used-by-end -->",
              content,
              flags=re.DOTALL
          )

          with open("README.md", "w") as f:
              f.write(new_content)

          EOF
          sudo rm docs/github-dependents-info.md
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(README): 🔧 Update dependents badges"
          file_pattern: README.md

