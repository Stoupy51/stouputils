name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish release artifacts to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist

          for i in {1..12}; do
            echo "Attempt $i: checking assets..."

            if gh release download "${{ github.event.release.tag_name }}" \
              --dir dist \
              --pattern "*.whl" \
              --pattern "*.tar.gz"; then
              ls -alFh dist
              echo "Assets downloaded successfully"
              exit 0
            fi

            echo "Not ready yet, sleeping 10s..."
            sleep 10
          done

          echo "Failed to download assets after waiting"
          exit 1

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.UV_PUBLISH_TOKEN }}
        run: uv publish dist/*

