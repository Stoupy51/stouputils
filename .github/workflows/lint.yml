
name: Lint

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.12
      - name: Install project
        run: |
          uv venv
          uv pip install -e .
      - name: Ruff check
        run: uv run ruff check ./stouputils

  pyright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.12
      - name: Install project
        run: |
          uv venv
          uv pip install -e .[docs,data_science,optional]
      - name: Pyright check
        run: uv run pyright ./stouputils

